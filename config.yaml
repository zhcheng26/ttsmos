# config.yaml
device: cpu           # cuda 或 cpu
batch_size: 16

weights:
  mos: 0.3
  sim: 0.3
  cer: 0.3
  prosody: 0.1

thresholds:
  mos: 4.2            # MOS 低于此值触发规则A（1-5 分制）
  sim: 4.2            # 相似度低于此值触发规则A（0-5 分制）
  cer: 0.15           # CER 高于此值触发规则A（15%）
  prosody: 0.5        # 韵律分低于此值触发规则A
  weighted: 2.5       # 综合分低于此值触发规则B

asr:
  model: tiny         # whisper 模型: tiny/base/small/medium/large-v3（演示用tiny，生产换medium）

dnsmos:
  model_path: models/sig_bak_ovr.onnx   # DNSMOS P.835 ONNX 文件路径

paths:
  ref: ref_dir/
  sysA: sysA_dir/
  sysB: sysB_dir/
  target_text: target_text.txt
  output: results/
